<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YallaBites Order Label</title>
    <style>
        @page {
            size: 152.4mm 101.6mm; /* 6" x 4" */
            margin: 0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: 7pt;
            line-height: 1.2;
            color: #000;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .label-container {
            width: 152.4mm; /* 6 inches */
            height: 101.6mm; /* 4 inches */
            padding: 2.5mm;
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Section */
        .header {
            border-bottom: 1.5px solid #000;
            padding-bottom: 1.5mm;
            margin-bottom: 1.5mm;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            min-height: 12mm;
        }

        .customer-info {
            flex: 1;
            font-weight: bold;
            font-size: 9pt;
        }

        .customer-name {
            display: block;
            margin-bottom: 0.5mm;
        }

        .order-number {
            font-size: 7pt;
            font-weight: normal;
        }

        .logo-container {
            flex: 0 0 auto;
            padding: 0 3mm;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            max-width: 30mm;
            max-height: 10mm;
            height: auto;
            width: auto;
            object-fit: contain;
            display: block;
        }

        .meta-info {
            flex: 1;
            text-align: right;
            font-size: 7pt;
        }

        .packed-time {
            font-weight: bold;
        }

        /* Items Container */
        .items-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.8mm;
            overflow: hidden;
            margin-bottom: 1.5mm;
            min-height: 0;
        }

        .item-row {
            border-bottom: 1px dotted #666;
            padding-bottom: 0.5mm;
            display: flex;
            flex-direction: column;
            gap: 0.3mm;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2mm;
        }

        .item-name {
            font-weight: bold;
            font-size: 8pt;
            text-transform: uppercase;
            flex: 1;
            line-height: 1.2;
        }

        .item-allergens {
            font-size: 6pt;
            font-weight: bold;
            border: 1px solid #000;
            padding: 0.5mm 1mm;
            white-space: nowrap;
            flex-shrink: 0;
            line-height: 1.1;
        }

        .item-ingredients {
            font-size: 6.5pt;
            color: #333;
            line-height: 1.15;
            padding-left: 0.5mm;
        }

        /* Footer Section */
        .footer-section {
            flex-shrink: 0;
            margin-top: auto;
        }

        .chef-info {
            font-style: italic;
            font-size: 7pt;
            border-top: 1px solid #000;
            padding-top: 1mm;
            margin-bottom: 1mm;
        }

        .delivery-notes {
            font-size: 7pt;
            font-weight: bold;
            background: #000;
            color: #fff;
            padding: 1mm 1.5mm;
            margin-bottom: 1mm;
            text-transform: uppercase;
            line-height: 1.2;
            min-height: 8mm;
            display: flex;
            align-items: center;
        }

        .compliance-footer {
            font-size: 5.5pt;
            text-align: center;
            border-top: 1px solid #000;
            padding-top: 0.8mm;
            text-transform: uppercase;
            font-weight: bold;
            line-height: 1.2;
        }

        /* Print Styles */
        @media print {
            body {
                background: #fff;
            }
            
            .label-container {
                width: 100%;
                height: 100%;
                page-break-inside: avoid;
                box-shadow: none;
            }
        }

        /* Utility Classes */
        .text-uppercase {
            text-transform: uppercase;
        }

        .text-bold {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="label-container">
        <!-- Header -->
        <div class="header">
            <div class="customer-info">
                <span class="customer-name">For: {{CUSTOMER_NAME}}</span>
                <span class="order-number">Order #{{ORDER_NUMBER}}</span>
            </div>
            
            <div class="logo-container">
                <img src="{{LOGO_URL}}" class="logo-img" alt="YallaBites">
            </div>

            <div class="meta-info">
                <div class="packed-time">Packed On:</div>
                <div>{{PACKED_TIME}}</div>
            </div>
        </div>

        <!-- Order Items -->
        <div class="items-container">
            {{ORDER_ITEMS}}
        </div>

        <!-- Footer -->
        <div class="footer-section">
            <div class="chef-info">
                Prepared by: {{CHEF_NAME}}
            </div>

            {{#if DELIVERY_NOTES}}
            <div class="delivery-notes">
                DELIVERY NOTE: {{DELIVERY_NOTES}}
            </div>
            {{/if}}

            <div class="compliance-footer">
                THIS PRODUCT WAS PRODUCED IN A PRIVATE RESIDENCE THAT IS NOT SUBJECT TO GOVERNMENTAL LICENSING OR INSPECTION.
            </div>
        </div>
    </div>
</body>
</html>
